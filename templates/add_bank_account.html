{% extends "base.html" %}

{% block title %}Add Bank Account - Budget Tracker{% endblock %}
{% block page_title %}Add New Bank Account{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-bank"></i> Add New Bank Account</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_bank_account') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Account Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="e.g., Chase Checking">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Account Type</label>
                        <select name="account_type" class="form-select" required>
                            <option value="checking">Checking</option>
                            <option value="savings">Savings</option>
                            <option value="money_market">Money Market</option>
                            <option value="cd">CD</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Institution</label>
                        <input type="text" name="institution" class="form-control" placeholder="Bank or credit union name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last 4 Digits of Account Number</label>
                        <input type="text" name="account_number_last4" class="form-control" maxlength="4" placeholder="1234">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Current Balance</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" name="current_balance" class="form-control" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Website</label>
                        <input type="url" name="website" class="form-control" placeholder="https://bank.com/login">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-save"></i> Add Account</button>
                        <a href="{{ url_for('bank_accounts') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

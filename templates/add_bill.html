{% extends "base.html" %}

{% block title %}Add Bill - Budget Tracker{% endblock %}
{% block page_title %}Add New Bill{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-plus-circle"></i> Add New Bill</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_bill') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Payee</label>
                        <select name="payee_id" class="form-select">
                            <option value="">-- Select Payee --</option>
                            {% for payee in payees %}
                                <option value="{{ payee.id }}">{{ payee.name }} ({{ payee.category or 'Uncategorized' }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount Due</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" name="amount" class="form-control" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Due Date</label>
                        <input type="date" name="due_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="is_recurring" id="is_recurring" value="1">
                            <label class="form-check-label" for="is_recurring">Recurring Bill</label>
                        </div>
                    </div>
                    <div class="mb-3" id="recurrence_type_container" style="display: none;">
                        <label class="form-label">Recurrence</label>
                        <select name="recurrence_type" class="form-select">
                            <option value="weekly">Weekly</option>
                            <option value="biweekly">Biweekly</option>
                            <option value="monthly" selected>Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="Optional notes..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-save"></i> Add Bill</button>
                        <a href="{{ url_for('bills') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('is_recurring').addEventListener('change', function() {
    document.getElementById('recurrence_type_container').style.display = this.checked ? 'block' : 'none';
});
</script>
{% endblock %}

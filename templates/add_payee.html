{% extends "base.html" %}

{% block title %}Add Payee - Budget Tracker{% endblock %}
{% block page_title %}Add New Payee{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-person-plus"></i> Add New Payee</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_payee') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="Company or person name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select">
                            <option value="">-- Select Category --</option>
                            <option value="utilities">Utilities</option>
                            <option value="rent">Rent/Mortgage</option>
                            <option value="insurance">Insurance</option>
                            <option value="subscriptions">Subscriptions</option>
                            <option value="phone">Phone/Internet</option>
                            <option value="medical">Medical</option>
                            <option value="auto">Auto/Transportation</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Account Number</label>
                        <input type="text" name="account_number" class="form-control" placeholder="Optional">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="Optional notes..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Website</label>
                        <input type="url" name="website" class="form-control" placeholder="https://example.com">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-save"></i> Add Payee</button>
                        <a href="{{ url_for('payees') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

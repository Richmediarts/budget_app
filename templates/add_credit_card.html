{% extends "base.html" %}

{% block title %}Add Credit Card - Budget Tracker{% endblock %}
{% block page_title %}Add New Credit Card{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-credit-card"></i> Add New Credit Card</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_credit_card') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Card Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="e.g., Chase Sapphire">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last 4 Digits</label>
                        <input type="text" name="last_four" class="form-control" maxlength="4" placeholder="1234">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Credit Limit</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" name="credit_limit" class="form-control" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Current Balance</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" name="current_balance" class="form-control" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Interest Rate (%)</label>
                        <input type="number" step="0.01" name="interest_rate" class="form-control" placeholder="0.00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Website</label>
                        <input type="url" name="website" class="form-control" placeholder="https://creditcard.com/login">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-save"></i> Add Card</button>
                        <a href="{{ url_for('credit_cards') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

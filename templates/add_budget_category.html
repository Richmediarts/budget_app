{% extends "base.html" %}

{% block title %}Add Budget Category - Budget Tracker{% endblock %}
{% block page_title %}Add New Budget Category{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5><i class="bi bi-pie-chart"></i> Add New Budget Category</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('add_budget_category') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Category Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="e.g., Groceries">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Monthly Limit</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" name="monthly_limit" class="form-control" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Color</label>
                        <input type="color" name="color" class="form-control form-control-color" value="#2E7D32">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-save"></i> Add Category</button>
                        <a href="{{ url_for('budget') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
